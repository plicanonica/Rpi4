<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PliDrive</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3 py-2">
  <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="#">
    <i class="bi bi-cloud-fill text-primary fs-4"></i>
    PliDrive
  </a>
  <div class="ms-auto d-flex align-items-center gap-3">
    <div class="storage-bar d-none d-md-flex align-items-center gap-2">
      <i class="bi bi-hdd text-secondary"></i>
      <div class="progress storage-progress" style="width:140px; height:6px;">
        <div id="storage-bar" class="progress-bar bg-primary" style="width:0%"></div>
      </div>
      <small id="storage-label" class="text-secondary">—</small>
    </div>
    <button class="btn btn-sm btn-outline-secondary" id="theme-toggle" title="Toggle theme">
      <i class="bi bi-moon-stars"></i>
    </button>
  </div>
</nav>

<!-- Toolbar -->
<div class="container-fluid px-3 py-2 border-bottom toolbar">
  <div class="d-flex align-items-center gap-2 flex-wrap">
    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="flex-grow-1">
      <ol class="breadcrumb mb-0" id="breadcrumb">
        <li class="breadcrumb-item active"><a href="#" data-path="" class="text-decoration-none crumb"><i class="bi bi-house-door"></i> Home</a></li>
      </ol>
    </nav>
    <!-- Actions -->
    <div class="d-flex gap-2">
      <button class="btn btn-sm btn-primary d-flex align-items-center gap-1" id="btn-upload">
        <i class="bi bi-cloud-upload"></i> Upload
      </button>
      <button class="btn btn-sm btn-outline-secondary d-flex align-items-center gap-1" id="btn-mkdir">
        <i class="bi bi-folder-plus"></i> New Folder
      </button>
      <div class="btn-group btn-group-sm" role="group">
        <button class="btn btn-outline-secondary active" id="view-grid" title="Grid view"><i class="bi bi-grid-3x3-gap"></i></button>
        <button class="btn btn-outline-secondary" id="view-list" title="List view"><i class="bi bi-list-ul"></i></button>
      </div>
    </div>
  </div>
</div>

<!-- Hidden file input -->
<input type="file" id="file-input" multiple class="d-none">

<!-- Main content -->
<div class="container-fluid px-3 py-3" id="main-content">
  <!-- Drop zone overlay -->
  <div id="drop-overlay" class="drop-overlay d-none">
    <div class="drop-overlay-inner">
      <i class="bi bi-cloud-upload display-1 text-primary"></i>
      <p class="fs-4 mt-2">Drop files to upload</p>
    </div>
  </div>

  <!-- Loading spinner -->
  <div id="loading" class="text-center py-5 d-none">
    <div class="spinner-border text-primary" role="status"></div>
  </div>

  <!-- Empty state -->
  <div id="empty-state" class="text-center py-5 d-none">
    <i class="bi bi-folder2-open display-1 text-secondary"></i>
    <p class="text-secondary mt-2">This folder is empty</p>
  </div>

  <!-- Grid view -->
  <div id="grid-view" class="row g-3"></div>

  <!-- List view -->
  <div id="list-view" class="d-none">
    <table class="table table-hover align-middle">
      <thead class="table-light">
        <tr>
          <th>Name</th>
          <th class="d-none d-md-table-cell">Modified</th>
          <th class="d-none d-md-table-cell text-end">Size</th>
          <th class="text-end">Actions</th>
        </tr>
      </thead>
      <tbody id="list-tbody"></tbody>
    </table>
  </div>
</div>

<!-- Upload progress toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="upload-toast" class="toast" role="alert">
    <div class="toast-header">
      <i class="bi bi-cloud-upload me-2 text-primary"></i>
      <strong class="me-auto">Uploading…</strong>
      <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
    </div>
    <div class="toast-body">
      <div class="progress mb-1">
        <div id="upload-progress" class="progress-bar progress-bar-striped progress-bar-animated" style="width:0%"></div>
      </div>
      <small id="upload-status">Preparing…</small>
    </div>
  </div>
</div>

<!-- New Folder Modal -->
<div class="modal fade" id="modal-mkdir" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title"><i class="bi bi-folder-plus me-1"></i> New Folder</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="text" class="form-control" id="mkdir-name" placeholder="Folder name" autofocus>
        <div id="mkdir-error" class="text-danger small mt-1 d-none"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary btn-sm" id="mkdir-confirm">Create</button>
      </div>
    </div>
  </div>
</div>

<!-- Rename Modal -->
<div class="modal fade" id="modal-rename" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title"><i class="bi bi-pencil me-1"></i> Rename</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="text" class="form-control" id="rename-input" autofocus>
        <div id="rename-error" class="text-danger small mt-1 d-none"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary btn-sm" id="rename-confirm">Rename</button>
      </div>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal fade" id="modal-delete" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title text-danger"><i class="bi bi-trash me-1"></i> Delete</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        Delete <strong id="delete-name"></strong>? This cannot be undone.
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-danger btn-sm" id="delete-confirm">Delete</button>
      </div>
    </div>
  </div>
</div>

<!-- Preview Modal -->
<div class="modal fade" id="modal-preview" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title" id="preview-title"></h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center p-0" id="preview-body" style="max-height:80vh; overflow:auto;">
      </div>
      <div class="modal-footer">
        <a id="preview-download" href="#" class="btn btn-primary btn-sm" download>
          <i class="bi bi-download me-1"></i> Download
        </a>
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
